<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starcalc</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/calculator.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
                <button data-action="backspace" class="operator">⌫</button>
                <button data-action="clear" class="operator">C</button>
                <button data-value="%" class="operator">%</button>
                <button data-value="/" class="operator">/</button>

                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button data-value="*" class="operator">X</button>

                <button data-value="4" >4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="-" class="operator">-</button>

                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button data-value="+" class="operator">+</button>

                <button data-value=".">.</button>
                <button data-value="0">0</button>
                <button id="equal" data-action="equals" class="operator">=</button>
        </div>
    </div>

    <script src="js/calculator.js" defer></script>
</body>
</html>
